name: Website CI

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  build-and-validate:
    name: Build and validate website
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Build website
        run: npm run build
