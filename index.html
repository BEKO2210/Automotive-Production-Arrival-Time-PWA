<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <!-- PWA Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Autoflow" />
    <meta name="application-name" content="Autoflow Tracker" />
    <meta name="msapplication-TileColor" content="#000000" />
    <meta name="msapplication-tap-highlight" content="no" />

    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Autoflow Tracker" />
    <meta property="og:description" content="Produktionslinien ETA - Berechnung von Ankunftszeiten" />
    <meta property="og:site_name" content="Autoflow Tracker" />

    <!-- Favicons -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512x512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192x192.png" />
    <link rel="mask-icon" href="/icons/icon-192x192.png" color="#d5001c" />

    <!-- Web App Manifest -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Preconnect for Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <title>Autoflow Tracker | Produktionslinien ETA</title>

    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: #000000;
        color: #ffffff;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      #root {
        min-height: 100vh;
        background: #000000;
      }
      .loading {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: #000000;
      }
      .loading-spinner {
        width: 48px;
        height: 48px;
        border: 3px solid #333;
        border-top-color: #d5001c;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="loading" role="status" aria-label="Anwendung wird geladen">
        <div class="loading-spinner"></div>
      </div>
    </div>
    <noscript>
      <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#000;color:#fff;padding:2rem;text-align:center;">
        <p>JavaScript muss aktiviert sein, um Autoflow Tracker zu verwenden.</p>
      </div>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
